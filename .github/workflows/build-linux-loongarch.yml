name: Build OpenRemoteShouter for Linux LoongArch

on:
  push:
    branches: [ "master", "main", "dev", "portable" ]
  workflow_dispatch:
    inputs:
      artifact_name:
        description: "Artifact name"
        required: false
        default: "OpenRemoteShouter-LoongArch"

env:
  CLASSISLAND_LOONGARCH_BASE: https://raw.githubusercontent.com/YU322142/ClassIsland/master
  LOONGNIX_DOTNET_BASE: https://ftp.loongnix.cn/dotnet/8.0.25/8.0.25-1/pkg
  LOONGARCH_DOTNET_RUNTIME_ARCHIVE: dotnet-runtime-8.0.25-linux-loongarch64.tar.xz
  LOONGARCH_ASPNETCORE_RUNTIME_ARCHIVE: aspnetcore-runtime-8.0.25-linux-loongarch64.tar.xz

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Patch global.json
        shell: bash
        run: |
          cat > global.json << 'EOF'
          {
            "sdk": {
              "version": "8.0.0",
              "rollForward": "latestFeature",
              "allowPrerelease": true
            }
          }
          EOF

      - name: Restore
        shell: bash
        run: dotnet restore RemoteShouter.csproj

      - name: Download LoongArch runtime and native libs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p LoongArch-NativeLibs LoongArch-Runtime

          curl --fail --location --retry 5 --retry-delay 2 \
            "$CLASSISLAND_LOONGARCH_BASE/LoongArch-NativeLibs/libSkiaSharp.so" \
            --output LoongArch-NativeLibs/libSkiaSharp.so

          curl --fail --location --retry 5 --retry-delay 2 \
            "$CLASSISLAND_LOONGARCH_BASE/LoongArch-NativeLibs/libHarfBuzzSharp.so" \
            --output LoongArch-NativeLibs/libHarfBuzzSharp.so

          curl --fail --location --retry 5 --retry-delay 2 \
            "$LOONGNIX_DOTNET_BASE/$LOONGARCH_DOTNET_RUNTIME_ARCHIVE" \
            --output "LoongArch-Runtime/$LOONGARCH_DOTNET_RUNTIME_ARCHIVE"
          curl --fail --location --retry 5 --retry-delay 2 \
            "$LOONGNIX_DOTNET_BASE/$LOONGARCH_DOTNET_RUNTIME_ARCHIVE.md5" \
            --output "LoongArch-Runtime/$LOONGARCH_DOTNET_RUNTIME_ARCHIVE.md5"

          curl --fail --location --retry 5 --retry-delay 2 \
            "$LOONGNIX_DOTNET_BASE/$LOONGARCH_ASPNETCORE_RUNTIME_ARCHIVE" \
            --output "LoongArch-Runtime/$LOONGARCH_ASPNETCORE_RUNTIME_ARCHIVE"
          curl --fail --location --retry 5 --retry-delay 2 \
            "$LOONGNIX_DOTNET_BASE/$LOONGARCH_ASPNETCORE_RUNTIME_ARCHIVE.md5" \
            --output "LoongArch-Runtime/$LOONGARCH_ASPNETCORE_RUNTIME_ARCHIVE.md5"

          test -s LoongArch-NativeLibs/libSkiaSharp.so
          test -s LoongArch-NativeLibs/libHarfBuzzSharp.so
          test -s "LoongArch-Runtime/$LOONGARCH_DOTNET_RUNTIME_ARCHIVE"
          test -s "LoongArch-Runtime/$LOONGARCH_ASPNETCORE_RUNTIME_ARCHIVE"
          (cd LoongArch-Runtime && md5sum -c "$LOONGARCH_DOTNET_RUNTIME_ARCHIVE.md5")
          (cd LoongArch-Runtime && md5sum -c "$LOONGARCH_ASPNETCORE_RUNTIME_ARCHIVE.md5")

      - name: Publish OpenRemoteShouter
        shell: bash
        run: |
          dotnet publish RemoteShouter.csproj \
            -c Release \
            --no-self-contained \
            -p:PublishDir=output/OpenRemoteShouter \
            -p:PublishBuilding=true \
            -p:PublishPlatform=linux \
            -p:Platforms_Linux=true \
            -p:TrimAssets=false \
            "-p:OpenRemoteShouter_PlatformTarget=Any CPU" \
            -p:UseAppHost=false

      - name: Inject LoongArch native libs and runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output/OpenRemoteShouter/runtimes/linux-loongarch64/native/

          install -m 755 LoongArch-NativeLibs/libSkiaSharp.so \
            output/OpenRemoteShouter/runtimes/linux-loongarch64/native/libSkiaSharp.so
          install -m 755 LoongArch-NativeLibs/libHarfBuzzSharp.so \
            output/OpenRemoteShouter/runtimes/linux-loongarch64/native/libHarfBuzzSharp.so

          tar -xf "LoongArch-Runtime/$LOONGARCH_DOTNET_RUNTIME_ARCHIVE" -C output/OpenRemoteShouter/
          tar -xf "LoongArch-Runtime/$LOONGARCH_ASPNETCORE_RUNTIME_ARCHIVE" -C output/OpenRemoteShouter/
          chmod +x output/OpenRemoteShouter/dotnet

      - name: Create launcher script
        shell: bash
        run: |
          cat > output/run.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          APP_DIR="$SCRIPT_DIR/OpenRemoteShouter"

          export DOTNET_CLI_TELEMETRY_OPTOUT=1
          export DISPLAY="${DISPLAY:-:0}"
          export XAUTHORITY="${XAUTHORITY:-$HOME/.Xauthority}"
          export DBUS_SESSION_BUS_ADDRESS="${DBUS_SESSION_BUS_ADDRESS:-unix:path=/run/user/$(id -u)/bus}"
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          export XDG_DATA_DIRS="${XDG_DATA_DIRS:-/usr/share:/usr/local/share}"
          export PATH="$APP_DIR:$PATH:/usr/bin:/usr/local/bin"
          export LD_LIBRARY_PATH="$APP_DIR/runtimes/linux-loongarch64/native:${LD_LIBRARY_PATH:-}"

          cd "$APP_DIR"
          mkdir -p "$SCRIPT_DIR/logs"

          if [ -x "./dotnet" ]; then
            DOTNET_CMD="./dotnet"
            export DOTNET_ROOT="$APP_DIR"
          else
            DOTNET_CMD="dotnet"
          fi

          if [ "$1" = "--foreground" ]; then
            shift
            exec "$DOTNET_CMD" OpenRemoteShouter.dll "$@"
          fi

          nohup "$DOTNET_CMD" OpenRemoteShouter.dll "$@" > "$SCRIPT_DIR/logs/openremoteshouter.log" 2>&1 &
          echo "OpenRemoteShouter started in background. Log: logs/openremoteshouter.log"
          SCRIPT
          chmod +x output/run.sh

      - name: Verify package contents
        shell: bash
        run: |
          set -euo pipefail

          test -f output/OpenRemoteShouter/OpenRemoteShouter.dll
          test -x output/OpenRemoteShouter/dotnet
          test -d output/OpenRemoteShouter/shared/Microsoft.AspNetCore.App
          test -f output/OpenRemoteShouter/runtimes/linux-loongarch64/native/libSkiaSharp.so
          test -f output/OpenRemoteShouter/runtimes/linux-loongarch64/native/libHarfBuzzSharp.so

      - name: Package tar.gz
        shell: bash
        run: |
          ARTIFACT_NAME="${{ github.event.inputs.artifact_name }}"
          if [ -z "$ARTIFACT_NAME" ]; then
            ARTIFACT_NAME="OpenRemoteShouter-LoongArch"
          fi

          cd output
          tar -czvf "../${ARTIFACT_NAME}.tar.gz" .
          echo "PACKAGE_PATH=${ARTIFACT_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact_name || 'OpenRemoteShouter-LoongArch' }}
          path: ${{ env.PACKAGE_PATH }}
